server {
    listen 80;
    server_name api.nextscout.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.nextscout.app;

    root /var/www/nextscout/scout_api/public;
    index index.php;

    # TLS files (adjust for your cert path)
    ssl_certificate /etc/letsencrypt/live/api.nextscout.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nextscout.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Limit request body (uploads tuned by app requirements)
    client_max_body_size 25m;

    # Basic rate limiting zones (define in nginx.conf http{} if needed)
    # limit_req_zone $binary_remote_addr zone=api_rate:10m rate=10r/s;
    # limit_req zone=api_rate burst=25 nodelay;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/nextscout_api_access.log;
    error_log /var/log/nginx/nextscout_api_error.log warn;
}


name: API Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/scout-api-hardening
      - fix/rc-workflow-to-feat

permissions:
  contents: read

concurrency:
  group: api-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
        env:
          APP_ENV: local
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: API route smoke
        run: php artisan route:list --path=api

      - name: Test smoke
        run: php artisan test

